<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0077cc">
<meta charset="UTF-8">
<title>Coastal Care Transport - Journey Price Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f2f2f2;
  padding: 20px;
}

#fareCalculator {
  border: 2px solid #0077cc;
  border-radius: 8px;
  padding: 20px;
  background-color: #ffffff;
  max-width: 360px;
  margin: 0 auto;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

#fareCalculator h1, #fareCalculator h2 {
  text-align: center;
  color: #0077cc;
  margin: 0;
}

#fareCalculator h2 {
  margin-bottom: 15px;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
  color: #333;
}

select, button {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

button {
  background-color: #0077cc;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background-color: #005fa3;
}

#result {
  margin-top: 15px;
  font-size: 1.2em;
  color: #007700;
  text-align: center;
}
</style>
</head>

<body>

<div id="fareCalculator">
  <h1>Coastal Care Transport</h1>
  <h2>Journey Price Calculator</h2>

  <label for="pickup">Pickup location:</label>
  <select id="pickup"></select>

  <label for="dropoff">Drop-off location:</label>
  <select id="dropoff"></select>

  <label for="journeyType">Journey type:</label>
  <select id="journeyType">
    <option value="single">Single Journey</option>
    <option value="return">Return Journey</option>
  </select>

  <button id="calcBtn">Calculate Fare</button>
  <div id="result"></div>
</div>

<script>
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/154dAUAW55ZdVyXRES70qDNGuPXNaYkxliLGbc8pg2uU/gviz/tq?tqx=out:json&tq&gid=1059243316";

const RATE_PER_KM = 1.7;

// Safe JSON extractor
function extractJson(text) {
  const start = text.indexOf("{");
  const end = text.lastIndexOf("}");
  return JSON.parse(text.substring(start, end + 1));
}

async function loadLocations() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const json = extractJson(text);

  const rows = json.table.rows.map(r => r.c.map(c => (c ? c.v : "")));
  const cols = json.table.cols.map(c => c.label || "");

  const pickupSelect = document.getElementById("pickup");
  const dropoffSelect = document.getElementById("dropoff");

  // PICKUP: use column headers (skip first blank column)
  for (let i = 1; i < cols.length; i++) {
    const loc = cols[i];
    if (loc && loc.trim() !== "") {
      const opt = document.createElement("option");
      opt.value = loc;
      opt.textContent = loc;
      pickupSelect.appendChild(opt);
    }
  }

  // DROPOFF: use first column of each row
  rows.forEach(r => {
    const loc = r[0];
    if (loc && typeof loc === "string" && loc.trim() !== "") {
      const opt = document.createElement("option");
      opt.value = loc;
      opt.textContent = loc;
      dropoffSelect.appendChild(opt);
    }
  });
}

async function calculateFare() {
  const pickup = document.getElementById("pickup").value.trim();
  const dropoff = document.getElementById("dropoff").value.trim();
  const journeyType = document.getElementById("journeyType").value;

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = extractJson(text);

    const rows = json.table.rows.map(r => r.c.map(c => (c ? c.v : "")));
    const cols = json.table.cols.map(c => c.label || "");

    const fromIndex = cols.indexOf(pickup);
    const toRow = rows.find(r => r[0] === dropoff);

    if (fromIndex === -1 || !toRow) {
      document.getElementById("result").textContent =
        "Location not found in data.";
      return;
    }

    const distance = parseFloat(toRow[fromIndex]);

    // Round to nearest $0.50 helper
    function roundToNearest50Cents(amount) {
      return Math.round(amount * 2) / 2;
    }

    // Journey multiplier
    const multiplier = journeyType === "return" ? 2 : 1;

    let fare = distance * RATE_PER_KM * multiplier;

    // Apply rounding BEFORE minimum fare check
    fare = roundToNearest50Cents(fare);

    let message = `Estimated ${journeyType} trip fare: $${fare.toFixed(2)}`;

    // Apply minimum fare rule AFTER rounding
    if (fare < 12.5) {
      fare = 12.5;
      message = `Estimated ${journeyType} trip fare: $${fare.toFixed(2)}`;
      message += `<br><span style="color:red; font-size:0.85em;">
                    A $12.50 minimum fare will apply to this journey
                  </span>`;
    }

    document.getElementById("result").innerHTML = message;

  } catch (err) {
    console.error(err);
    document.getElementById("result").textContent = "Error loading data.";
  }
}

document.getElementById("calcBtn").addEventListener("click", calculateFare);

loadLocations();
</script>

<script>
  function sendHeight() {
    const height = document.documentElement.scrollHeight;
    parent.postMessage({ iframeHeight: height }, "*");
  }

  window.onload = sendHeight;
  window.onresize = sendHeight;

  const observer = new MutationObserver(sendHeight);
  observer.observe(document.body, { 
    childList: true, 
    subtree: true, 
    characterData: true 
  });
</script>

</body>
</html>
