<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Care Journey Price Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f2f2f2;
  padding: 20px;
}

#fareCalculator {
  border: 2px solid #0077cc;
  border-radius: 8px;
  padding: 20px;
  background-color: #ffffff;
  max-width: 360px;
  margin: 0 auto;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

#fareCalculator h2 {
  text-align: center;
  color: #0077cc;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
  color: #333;
}

select, button {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

button {
  background-color: #0077cc;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background-color: #005fa3;
}

#result {
  margin-top: 15px;
  font-size: 1.2em;
  color: #007700;
  text-align: center;
}
</style>
</head>

<body>

<div id="fareCalculator">
  <h2>Coastal Care Journey Price Calculator</h2>

  <label for="pickup">Pickup location:</label>
  <select id="pickup"></select>

  <label for="dropoff">Drop-off location:</label>
  <select id="dropoff"></select>

  <button id="calcBtn">Calculate Fare</button>
  <div id="result"></div>
</div>

<script>
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/154dAUAW55ZdVyXRES70qDNGuPXNaYkxliLGbc8pg2uU/gviz/tq?tqx=out:json&tq&gid=1059243316";

const RATE_PER_KM = 1.7;

// Load dropdowns from sheet automatically
async function loadLocations() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const json = JSON.parse(text.substring(47, text.length - 2));
  const rows = json.table.rows.map(r => r.c.map(c => (c ? c.v : "")));

  const headers = rows[0]; // top row = column headers
  const pickupSelect = document.getElementById("pickup");
  const dropoffSelect = document.getElementById("dropoff");

  // Load pickup locations from headers (skip first column ALWAYS)
  headers.forEach((loc, index) => {
    if (index === 0) return; // skip column A
    if (typeof loc === "string" && loc.trim() !== "") {
      const opt = document.createElement("option");
      opt.textContent = loc;
      pickupSelect.appendChild(opt);
    }
  });

  // Load dropoff locations from first column of each row (skip header row)
  rows.slice(1).forEach(r => {
    const loc = r[0];
    if (typeof loc === "string" && loc.trim() !== "") {
      const opt = document.createElement("option");
      opt.textContent = loc;
      dropoffSelect.appendChild(opt);
    }
  });
}

async function calculateFare() {
  const pickup = document.getElementById("pickup").value.trim();
  const dropoff = document.getElementById("dropoff").value.trim();

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = json.table.rows.map(r => r.c.map(c => (c ? c.v : "")));

    const headers = rows[0];
    const fromIndex = headers.indexOf(pickup);
    const toRow = rows.find(r => r[0] === dropoff);

    if (fromIndex === -1 || !toRow) {
      document.getElementById("result").textContent =
        "Location not found in data.";
      return;
    }

    const distance = parseFloat(toRow[fromIndex]);
    const fare = (distance * RATE_PER_KM).toFixed(2);

    document.getElementById("result").textContent =
      `Estimated fare: $${fare}`;
  } catch (err) {
    console.error(err);
    document.getElementById("result").textContent = "Error loading data.";
  }
}

document.getElementById("calcBtn").addEventListener("click", calculateFare);

loadLocations();
</script>

</body>
</html>
